<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aᴅᴍɪɴ Pᴀɴᴇʟ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#ff758c,#ff7eb3);padding:20px;color:#333;}
.card{background:white;border-radius:18px;padding:20px;margin-bottom:20px;box-shadow:0 10px 30px rgba(0,0,0,0.2);}
h2{text-align:center;margin-bottom:10px;}
input,select{width:100%;padding:12px;margin:10px 0;border:2px solid #eee;border-radius:10px;}
button{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#ff758c,#ff7eb3);color:white;font-weight:700;}
.msg{text-align:center;margin-top:10px;font-size:13px;}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{border:1px solid #ddd;padding:8px;text-align:center;font-size:13px;}
th{background:#ff758c;color:white;}
</style>
</head>
<body>

<h2>Aᴅᴍɪɴ Pᴀɴᴇʟ</h2>

<div class="card">
<h3>Uꜱᴇʀs Mᴀɴᴀɢᴇᴍᴇɴᴛ</h3>
<button onclick="loadUsers()">Lᴏᴀᴅ Uꜱᴇʀs</button>
<table id="usersTable"><thead><tr><th>Username</th><th>Mobile</th><th>Balance</th><th>Action</th></tr></thead><tbody></tbody></table>
</div>

<div class="card">
<h3>Aᴅᴅ Bᴀʟᴀɴᴄᴇ</h3>
<input id="addMobile" placeholder="Uꜱᴇʀ Mᴏʙɪʟᴇ">
<input id="addAmount" type="number" placeholder="Aᴍᴏᴜɴᴛ">
<button onclick="addBalance()">Aᴅᴅ</button>
<p id="msg1" class="msg"></p>
</div>

<div class="card">
<h3>Bʟᴏᴄᴋ / Uɴʙʟᴏᴄᴋ Uꜱᴇʀ</h3>
<input id="blockMobile" placeholder="Uꜱᴇʀ Mᴏʙɪʟᴇ">
<select id="blockOption">
<option value="true">Bʟᴏᴄᴋ</option>
<option value="false">Uɴʙʟᴏᴄᴋ</option>
</select>
<button onclick="blockUser()">Sᴜʙᴍɪᴛ</button>
<p id="msg2" class="msg"></p>
</div>

<div class="card">
<h3>Tʀᴀɴꜱᴀᴄᴛɪᴏɴ Hɪꜱᴛᴏʀʏ</h3>
<button onclick="loadTxns()">Lᴏᴀᴅ Tʀᴀɴꜱᴀᴄᴛɪᴏɴꜱ</button>
<table id="txnTable"><thead><tr><th>TxnID</th><th>Sender</th><th>Receiver</th><th>Amount</th><th>Type</th></tr></thead><tbody></tbody></table>
</div>

<script>
const token = localStorage.getItem("adminToken");

// Load users
async function loadUsers(){
  const r = await fetch('/admin-users',{headers:{Authorization:'Bearer '+token}});
  const d = await r.json();
  const tbody = document.querySelector('#usersTable tbody');
  tbody.innerHTML='';
  d.forEach(u=>{
    tbody.innerHTML+=`<tr>
      <td>${u.username}</td>
      <td>${u.mobile}</td>
      <td>₹${u.balance}</td>
      <td>${u.isBlocked?'Bʟᴏᴄᴋᴇᴅ':'Aᴄᴛɪᴠᴇ'}</td>
    </tr>`;
  });
}

// Add balance
async function addBalance(){
  const mobile=document.getElementById('addMobile').value;
  const amount=document.getElementById('addAmount').value;
  const r=await fetch('/admin-add-balance',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify({mobile,amount})});
  const d=await r.json();
  msg1.innerText=d.success?`₹${amount} Aᴅᴅᴇᴅ`:`${d.error}`;
}

// Block/Unblock
async function blockUser(){
  const mobile=document.getElementById('blockMobile').value;
  const block=document.getElementById('blockOption').value==='true';
  const r=await fetch('/admin-block',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify({mobile,block})});
  const d=await r.json();
  msg2.innerText=d.success?`Uꜱᴇʀ ${block?'Bʟᴏᴄᴋᴇᴅ':'Uɴʙʟᴏᴄᴋᴇᴅ'}`:`${d.error}`;
}

// Load transactions
async function loadTxns(){
  const r=await fetch('/admin-transactions',{headers:{Authorization:'Bearer '+token}});
  const d=await r.json();
  const tbody=document.querySelector('#txnTable tbody');
  tbody.innerHTML='';
  d.forEach(t=>{
    tbody.innerHTML+=`<tr>
      <td>${t.txnId}</td>
      <td>${t.sender?.name||'-'}</td>
      <td>${t.receiver?.name||'-'}</td>
      <td>₹${t.amount}</td>
      <td>${t.type}</td>
    </tr>`;
  });
}
</script>
</body>
</html>
