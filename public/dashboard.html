<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dᴀꜱʜʙᴏᴀʀᴅ</title>

<style>
body{
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#667eea,#764ba2);
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:18px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.balance{
  font-size:32px;
  font-weight:800;
  color:#667eea;
}

.btn{
  display:block;
  margin-top:15px;
  padding:12px;
  border-radius:10px;
  background:#667eea;
  color:white;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="card">
<h2>Dᴀꜱʜʙᴏᴀʀᴅ</h2>

<div class="balance" id="bal">₹0</div>

<a href="/transfer" class="btn">Sᴇɴᴅ Mᴏɴᴇʏ</a>

</div>

<script>
const token=localStorage.getItem("token");

fetch('/balance-api',{
  headers:{Authorization:'Bearer '+token}
})
.then(r=>r.json())
.then(d=>{
  document.getElementById("bal").innerText="₹"+d.balance;
});
</script>

</body>
</html>
