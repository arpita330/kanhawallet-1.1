<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tʀᴀɴꜱᴀᴄᴛɪᴏɴ Hɪꜱᴛᴏʀʏ</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
  padding:20px;
}

.card{
  background:white;
  border-radius:18px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
  text-align:center;
  margin-bottom:15px;
}

.txn{
  display:flex;
  justify-content:space-between;
  padding:12px 0;
  border-bottom:1px solid #eee;
}

.name{font-weight:600;font-size:14px}
.note{font-size:12px;color:#888}

.amt{font-weight:700}
.credit{color:#22c55e}
.debit{color:#ef4444}

.date{
  font-size:11px;
  color:#aaa;
  text-align:right;
}

.empty{
  text-align:center;
  color:#888;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="card">

<h2>Tʀᴀɴꜱᴀᴄᴛɪᴏɴꜱ</h2>

<div id="list">
<p class="empty">Lᴏᴀᴅɪɴɢ...</p>
</div>

</div>

<script>
const token = localStorage.getItem("token");

async function load(){
  const r = await fetch('/transactions-api',{
    headers:{ Authorization:'Bearer '+token }
  });

  const data = await r.json();

  const list = document.getElementById("list");

  if(!data.length){
    list.innerHTML='<p class="empty">Nᴏ Tʀᴀɴꜱᴀᴄᴛɪᴏɴꜱ</p>';
    return;
  }

  const user = JSON.parse(localStorage.getItem("user")||"{}");

  list.innerHTML = data.map(t=>{
    const isCredit =
      t.receiver?._id === user._id ||
      t.type === "deposit" ||
      t.type === "gift" ||
      t.type === "lifafa";

    const name = isCredit
      ? (t.sender?.name || "Sʏꜱᴛᴇᴍ")
      : (t.receiver?.name || "Wɪᴛʜᴅʀᴀᴡ");

    return `
    <div class="txn">
      <div>
        <div class="name">${name}</div>
        <div class="note">${t.note || t.type}</div>
      </div>
      <div>
        <div class="amt ${isCredit?'credit':'debit'}">
          ${isCredit?'+':'-'}₹${t.amount}
        </div>
        <div class="date">
          ${new Date(t.createdAt).toLocaleDateString()}
        </div>
      </div>
    </div>`;
  }).join('');
}

load();
</script>

</body>
</html>
