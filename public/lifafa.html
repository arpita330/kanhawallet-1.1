<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lɪꜰᴀꜰᴀ</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
  padding:20px;
}

.card{
  background:white;
  border-radius:18px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
  text-align:center;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:2px solid #eee;
  border-radius:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  font-weight:700;
}

.msg{
  text-align:center;
  margin-top:10px;
  font-size:13px;
}
</style>
</head>

<body>

<!-- CREATE -->
<div class="card">

<h2>Cʀᴇᴀᴛᴇ Lɪꜰᴀꜰᴀ</h2>

<input id="total" type="number" placeholder="Tᴏᴛᴀʟ Aᴍᴏᴜɴᴛ">
<input id="users" type="number" placeholder="Nᴜᴍʙᴇʀ Oꜰ Uꜱᴇʀꜱ">

<button onclick="create()">Cʀᴇᴀᴛᴇ</button>

<p id="msg1" class="msg"></p>

</div>

<!-- CLAIM -->
<div class="card">

<h2>Cʟᴀɪᴍ Lɪꜰᴀꜰᴀ</h2>

<input id="code" placeholder="Eɴᴛᴇʀ Cᴏᴅᴇ">

<button onclick="claim()">Cʟᴀɪᴍ</button>

<p id="msg2" class="msg"></p>

</div>

<script>
const token = localStorage.getItem("token");

// CREATE
async function create(){
  const totalAmount = document.getElementById("total").value;
  const maxClaims = document.getElementById("users").value;

  if(totalAmount < 1 || maxClaims < 1){
    msg1.innerText = "Iɴᴠᴀʟɪᴅ Vᴀʟᴜᴇ";
    return;
  }

  const r = await fetch('/lifafa-create-api',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      Authorization:'Bearer '+token
    },
    body:JSON.stringify({ totalAmount, maxClaims })
  });

  const d = await r.json();

  msg1.innerText = d.success
    ? "Cᴏᴅᴇ: " + d.code
    : d.error;
}

// CLAIM
async function claim(){
  const code = document.getElementById("code").value;

  if(!code){
    msg2.innerText = "Eɴᴛᴇʀ Cᴏᴅᴇ";
    return;
  }

  const r = await fetch('/lifafa-claim-api',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      Authorization:'Bearer '+token
    },
    body:JSON.stringify({ code })
  });

  const d = await r.json();

  msg2.innerText = d.success
    ? "₹"+d.amount+" Rᴇᴄᴇɪᴠᴇᴅ"
    : d.error;
}
</script>

</body>
</html>
