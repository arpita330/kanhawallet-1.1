<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tʀᴀɴꜱꜰᴇʀ</title>

<style>
body{
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#667eea,#764ba2);
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:2px solid #eee;
  border-radius:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
}

.msg{text-align:center;margin-top:10px}
</style>
</head>

<body>

<div class="card">

<h2>Sᴇɴᴅ Mᴏɴᴇʏ</h2>

<input id="mobile" placeholder="Rᴇᴄᴇɪᴠᴇʀ Mᴏʙɪʟᴇ">
<input id="amount" placeholder="Aᴍᴏᴜɴᴛ">

<button onclick="send()">Sᴇɴᴅ</button>

<p id="msg" class="msg"></p>

</div>

<script>
const token=localStorage.getItem("token");

async function send(){
  const r=await fetch('/transfer-api',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      Authorization:'Bearer '+token
    },
    body:JSON.stringify({
      mobile:mobile.value,
      amount:Number(amount.value)
    })
  });

  const d=await r.json();
  msg.innerText=d.success?"Sᴜᴄᴄᴇꜱꜱ":d.error;
}
</script>

</body>
</html>
