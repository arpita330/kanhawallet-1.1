<!DOCTYPE html>
<html>
<head>
<title>Kᴀɴʜᴀ Wᴀʟʟᴇᴛ</title>
<style>
body{font-family:sans-serif;background:#667eea;color:white;text-align:center;padding:20px}
input,button{padding:10px;margin:5px;width:90%}
</style>
</head>

<body>

<h2>Kᴀɴʜᴀ Wᴀʟʟᴇᴛ</h2>

<h3>Rᴇɢɪꜱᴛᴇʀ</h3>
<input id="username" placeholder="Uꜱᴇʀɴᴀᴍᴇ">
<input id="name" placeholder="Fᴜʟʟ Nᴀᴍᴇ">
<input id="mobile" placeholder="Mᴏʙɪʟᴇ">
<input id="telegram" placeholder="Tᴇʟᴇɢʀᴀᴍ Iᴅ">
<input id="password" type="password" placeholder="Pᴀꜱꜱᴡᴏʀᴅ">

<button onclick="sendOtp()">Sᴇɴᴅ OTP</button>
<input id="otp" placeholder="Eɴᴛᴇʀ OTP">
<button onclick="verifyOtp()">Vᴇʀɪꜰʏ OTP</button>

<button onclick="register()">Cʀᴇᴀᴛᴇ Aᴄᴄᴏᴜɴᴛ</button>

<h3>Lᴏɢɪɴ</h3>
<input id="lmobile" placeholder="Mᴏʙɪʟᴇ">
<input id="lpass" type="password" placeholder="Pᴀꜱꜱᴡᴏʀᴅ">
<button onclick="login()">Lᴏɢɪɴ</button>

<p id="msg"></p>

<script>
async function sendOtp(){
  const mobile=document.getElementById("mobile").value;
  const telegramId=document.getElementById("telegram").value;

  const r=await fetch('/send-otp-api',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({mobile,telegramId})
  });

  const d=await r.json();
  msg.innerText=d.message||d.error;
}

async function verifyOtp(){
  const mobile=document.getElementById("mobile").value;
  const otp=document.getElementById("otp").value;

  const r=await fetch('/verify-otp-api',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({mobile,otp})
  });

  const d=await r.json();
  msg.innerText=d.success?"Vᴇʀɪꜰɪᴇᴅ":d.error;
}

async function register(){
  const data={
    username:username.value,
    name:name.value,
    mobile:mobile.value,
    telegramId:telegram.value,
    password:password.value
  };

  const r=await fetch('/register-api',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(data)
  });

  const d=await r.json();
  msg.innerText=d.success?"Aᴄᴄᴏᴜɴᴛ Cʀᴇᴀᴛᴇᴅ":d.error;
}

async function login(){
  const r=await fetch('/login-api',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      mobile:lmobile.value,
      password:lpass.value
    })
  });

  const d=await r.json();

  if(d.success){
    localStorage.setItem("token",d.token);
    location.href="/dashboard";
  }else{
    msg.innerText=d.error;
  }
}
</script>

</body>
</html>
